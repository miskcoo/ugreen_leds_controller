name: Build kernel module for TrueNAS

on:
  push:
    branches:
      - master
  workflow_dispatch:
  
  schedule:
    - cron: "0 0 * * *" 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the changed files back to the repository.
      contents: write

    steps:
    - name: Checkout source repository
      uses: actions/checkout@v7
      with:
        ref: master
        path: source

    - name: Checkout artifact branch
      uses: actions/checkout@v7
      with:
        ref: gh-actions
        path: artifacts

    - name: Build the kernel modules
      working-directory: source/build-scripts/truenas
      env:
        TRUENAS_BUILD_ROOT: ${{ github.workspace }}/artifacts/build-scripts/truenas/build
        UGREEN_SOURCE_REFS: "master v0.3 v0.4-beta"
      run: bash build-all.sh

    - name: Push results to GitHub
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        repository: artifacts
        commit_message: "Add compiled modules"
        branch: gh-actions
        file_pattern: 'build-scripts/truenas/build'
